services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lexorchestrator
      POSTGRES_USER: lex
      POSTGRES_PASSWORD: lex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/01-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lex -d lexorchestrator"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lex:lex@postgres:5432/lexorchestrator
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingest:
    build: .
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lex:lex@postgres:5432/lexorchestrator
      REDIS_URL: redis://redis:6379/0
    command: ["python", "/app/scripts/ingest_sample.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
